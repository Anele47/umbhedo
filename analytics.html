<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<title>Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body class="analytics">
     <header class="navigation">

    <!-- Left -->
    <label for="sidebarToggle" class="hamburgers">
        <i class="fa-solid fa-bars"></i>
    </label>

    <!-- Center -->
    <div class="cover-logoss">
        <i class="fa-solid fa-check"></i>
        MyTasks
    </div>

    <!-- Right -->
    <div class="nav-actions">
        <a href="tasks.html" class="addtask-btn">
            <i class="fa-solid fa-plus"></i>
            Add Task
        </a>

        <a href="profile.html" class="profile-btn">
            <i class="fa-solid fa-user"></i>
        </a>
    </div>

</header>

   <!-- HIDDEN CHECKBOX CONTROLLER -->
<input type="checkbox" id="sidebarToggle" class="sidebar-toggle">


<!-- SIDEBAR -->
<aside class="sidebarapp">
  <h2 class="logo">Menu</h2>

 <nav>
    <a href="home.html">
        <i class="fa-solid fa-house"></i> Dashboard
    </a>

    <a href="tasks.html">
        <i class="fa-solid fa-list-check"></i> Tasks
    </a>

    <a href="analytics.html">
        <i class="fa-solid fa-chart-line"></i> Analytics
    </a>

    <a href="calendar.html">
        <i class="fa-solid fa-calendar-days"></i> Calendar
    </a>

    <a href="profile.html">
        <i class="fa-solid fa-user"></i> Profile
    </a>

    <a href="settings.html">
        <i class="fa-solid fa-gear"></i> Settings
    </a>
</nav>

  <a href="signin.html" class="logout">
    <i class="fa-solid fa-right-from-bracket"></i>
    Logout
</a>
</aside>

<!-- OVERLAY (click to close) -->
<label for="sidebarToggle" class="overlay"></label>

<main class="contents">

<div class="analytics-main">

    <h1>Analytics</h1>
    <p class="subtitle">Track your productivity and progress.</p>

    <div class="analytics-cards">

        <div class="analytics-card">
            <h3>Completion Rate</h3>
            <div class="number" id="completionRate">0%</div>
        </div>

        <div class="analytics-card">
            <h3>Tasks Completed</h3>
            <div class="number" id="completedTasks">0</div>
        </div>

        <div class="analytics-card">
            <h3>Total Tasks</h3>
            <div class="number" id="totalTasks">0</div>
        </div>

        <div class="analytics-card">
            <h3>Current Streak</h3>
            <div class="number" id="streak">0</div>
        </div>

    </div>

    <div class="analytics-charts">

        <div class="chart-box">
            <h3>Weekly Productivity</h3>
            <canvas id="weeklyChart"></canvas>
        </div>

        <div class="chart-box">
            <h3>Task Priority</h3>
        <canvas id="priorityChart"></canvas>
    </div>

    </div>

    <div class="chart-box monthly">
        <h3>Monthly Productivity</h3>
        <canvas id="monthlyChart"></canvas>
    </div>

</div>
</main>

<script src="analytics.js"></script>

</body>
 
</html>

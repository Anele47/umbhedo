<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Profile</title>
  </head>
  <body class="profile">
     <header class="navigation">

    <!-- Left -->
    <label for="sidebarToggle" class="hamburgers">
        <i class="fa-solid fa-bars"></i>
    </label>

    <!-- Center -->
    <div class="cover-logoss">
        <i class="fa-solid fa-check"></i>
        MyTasks
    </div>

    <!-- Right -->
    <div class="nav-actions">
        <a href="tasks.html" class="addtask-btn">
            <i class="fa-solid fa-plus"></i>
            Add Task
        </a>

        <a href="profile.html" class="profile-btn">
            <i class="fa-solid fa-user"></i>
        </a>
    </div>

</header>
   <!-- HIDDEN CHECKBOX CONTROLLER -->
<input type="checkbox" id="sidebarToggle" class="sidebar-toggle">


<!-- SIDEBAR -->
<aside class="sidebarapp">
  <h2 class="logo">Menu </h2>

<nav>
    <a href="home.html">
        <i class="fa-solid fa-house"></i> Dashboard
    </a>

    <a href="tasks.html">
        <i class="fa-solid fa-list-check"></i> Tasks
    </a>

    <a href="analytics.html">
        <i class="fa-solid fa-chart-line"></i> Analytics
    </a>

    <a href="calendar.html">
        <i class="fa-solid fa-calendar-days"></i> Calendar
    </a>

    <a href="profile.html">
        <i class="fa-solid fa-user"></i> Profile
    </a>

    <a href="settings.html">
        <i class="fa-solid fa-gear"></i> Settings
    </a>
</nav>

  <a href="signin.html" class="logout">
    <i class="fa-solid fa-right-from-bracket"></i>
    Logout
</a>
</aside>

<!-- OVERLAY (click to close) -->
<label for="sidebarToggle" class="overlay"></label>


      <main class="contents">
        <div class="profile-card">
          <div class="profile-header">
            <div class="user-info">
              <img
                id="profileImage"
                src="https://via.placeholder.com/120"
                alt="Profile"
              />

              <div>
                <h1 id="profileName">User Name</h1>
                <p id="profileEmail">user@email.com</p>
              </div>
            </div>

            <a href="settings.html">
              <button class="btn edit-profile" onclick="editProfile()">
               Edit Profile
              </button>  
            </a>
          </div>

          <div class="profile-stats">
            <div class="profile-stat">
              <h2 id="totalTasks">0</h2>
              <p>Total Tasks</p>
            </div>

            <div class="profile-stat">
              <h2 id="completedTasks">0</h2>
              <p>Completed Tasks</p>
            </div>

            <div class="profile-stat">
              <h2 id="completionRate">0%</h2>
              <p>Completion Rate</p>
            </div>

            <div class="profile-stat">
              <h2 id="streak">0</h2>
              <p>Day Streak</p>
            </div>
          </div>

          <div class="profile-about">
            <h3>About Me</h3>
            <p id="aboutMe">No bio added yet.</p>
          </div>
        </div>
    </div>
      </main>

    <script src="profile.js"></script>
  </body>
   <footer id="allmypages">

    <h3>MyTasks</h3>

    <p>
        Organize your life, One task at a time.
    </p>

    <div class="socials">

        <i class="fab fa-github"></i>
        <i class="fab fa-linkedin"></i>
        <i class="fab fa-tiktok"></i>
        <i class="fab fa-instagram"></i>
        <i class="fab fa-facebook"></i>

    </div>

    <p class="copyright">
        © 2026 MyTasks. All Rights Reserved.
    </p>

</footer>
  
</html>
